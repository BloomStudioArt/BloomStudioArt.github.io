---
layout: default
---

<article class="project-page">
    <header class="project-header">
        <h1>{{ page.title }}</h1>
        <time>{{ page.date | date: "%B %Y" }}</time>
        {% if page.tags %}
            <ul class="tags">
                {% for tag in page.tags %}
                    <li>{{ tag }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    </header>

    {% if page.cover %}
        <img class="project-cover" src="{{ page.cover }}" alt="{{ page.title }}" />
    {% endif %}

    <div class="project-body">
        {{ content }}
    </div>
</article>
